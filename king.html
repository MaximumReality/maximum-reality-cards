<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIRECTOR OVERRIDE</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; padding: 20px; }
        textarea { 
            width: 100%; height: 150px; 
            background: #050505; color: #00ff41; 
            border: 1px solid #00ff41; margin-bottom: 10px;
            padding: 10px; font-family: monospace;
        }
        button { 
            width: 100%; padding: 15px; 
            background: #003310; color: #00ff41; 
            border: 1px solid #00ff41; cursor: pointer;
        }
    </style>
    <div id="console" style="background:#000; padding:20px; border:2px solid #00ff41; color:#00ff41; font-family:monospace;">
    <h2>[ DIRECTOR OVERRIDE // MEDIA UPLINK ]</h2>
    
    <textarea id="directorMsg" placeholder="ENTER TRANSMISSION..." style="width:100%; height:80px; background:#111; color:#00ff41; border:1px solid #00ff41; margin-bottom:10px;"></textarea>
    
    <label style="display:block; margin-bottom:10px;">ATTACH PROPAGANDA:</label>
    <input type="file" id="imageInput" accept="image/*" style="margin-bottom:20px; color:#00ff41;">
    
    <button onclick="transmit()" style="width:100%; padding:15px; background:#003310; color:#00ff41; border:1px solid #00ff41; cursor:pointer;">
        [ BROADCAST SIGNAL ]
    </button>
</div>

<script>
async function transmit() {
    const msg = document.getElementById('directorMsg').value;
    const fileInput = document.getElementById('imageInput');
    const webhookURL = "https://discord.com/api/webhooks/1492766031733719040/hE1o09FNDfr3Q7Iwgaa5BlqEOj3dNOLfalQrngzjZgV7QBUoppciEljKCF9q4Ui-MI--";

    // Use FormData to handle file uploads
    const formData = new FormData();
    
    // The JSON part of the message
    const payload = {
        username: "The Director // BRM",
        avatar_url: "https://maximumreality.github.io/living/director-avatar.jpg",
        content: msg
    };

    // Append JSON as 'payload_json'
    formData.append('payload_json', JSON.stringify(payload));

    // Append the actual file if one is selected
    if (fileInput.files[0]) {
        formData.append('file', fileInput.files[0]);
    }

    try {
        const response = await fetch(webhookURL, {
            method: 'POST',
            body: formData // No headers needed, browser sets boundary
        });

        if (response.ok) {
            alert("TRANSMISSION SUCCESSFUL.");
            document.getElementById('directorMsg').value = '';
            fileInput.value = ''; // Reset file picker
        } else {
            alert("SIGNAL FAILURE: " + response.statusText);
        }
    } catch (err) {
        alert("CRITICAL ERROR: " + err.message);
    }
}
</script>

</body>
</html>
